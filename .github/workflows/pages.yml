name: Deploy Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Deploy Site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: mymindstorm/setup-emsdk@v14
      
      - run: sudo ./setup.sh

      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./build

      - uses: actions/deploy-pages@v4
        id: deployment
